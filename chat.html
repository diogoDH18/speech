<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Chat dos Atletas</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 15px;
      background: #1e293b;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 15px;
    }

    .chat-box {
      background: #1e293b;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .msg {
      background: #2563eb;
      padding: 8px;
      margin: 5px 0;
      border-radius: 8px;
      width: fit-content;
      max-width: 80%;
    }

    input {
      width: 70%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      width: 28%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .row {
      display: flex;
      justify-content: space-between;
    }

  </style>
</head>

<body>

<header>
  <h1>🏟️ Chat dos Atletas</h1>
  <p>Fale sobre esportes em tempo real</p>
</header>

<div class="container">

  <div class="chat-box" id="chat"></div>

  <div class="row">
    <input id="msg" placeholder="Escreva sua mensagem...">
    <button onclick="sendMsg()">Enviar</button>
  </div>

</div>

<script>
function sendMsg() {
  let text = document.getElementById("msg").value;

  if (text.trim() === "") return;

  let div = document.createElement("div");
  div.className = "msg";
  div.innerText = text;

  document.getElementById("chat").appendChild(div);

  document.getElementById("msg").value = "";

  document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;
}
</script>

</body>
</html>
