<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mini Corrida IA</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 15px;
  background: #1e293b;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

.chat {
  background: #1e293b;
  height: 400px;
  overflow-y: auto;
  padding: 10px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.user {
  text-align: right;
  margin: 5px 0;
}

.ai {
  text-align: left;
  margin: 5px 0;
  color: #60a5fa;
}

input {
  width: 70%;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  width: 28%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}
</style>
</head>

<body>

<header>
  <h1>🤖 Mini Corrida IA</h1>
  <p>criada pela D&Happs</p>
</header>

<div class="container">

<div class="chat" id="chat"></div>

<div>
  <input id="msg" placeholder="Fale com a Mini Corrida...">
  <button onclick="send()">Enviar</button>
</div>

</div>

<script>

const AI_NAME = "Mini Corrida";
const CREATOR = "D&Happs (Diogo Henrique)";

function add(text, type) {
  let div = document.createElement("div");
  div.className = type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);

  document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;
}

function brain(text) {
  text = text.toLowerCase();

  // identidade
  if (text.includes("seu nome")) {
    return `Meu nome é ${AI_NAME} 🤖`;
  }

  if (text.includes("quem te criou")) {
    return `Fui criada pela empresa ${CREATOR} 🚀`;
  }

  if (text.includes("d&happs")) {
    return "Sim 😄 essa é a empresa que me criou!";
  }

  // amizade
  if (text.includes("oi") || text.includes("olá")) {
    return "Oi 😊 eu sou a Mini Corrida, sua amiga virtual!";
  }

  if (text.includes("triste")) {
    return "Eu tô aqui com você 🤝 quer conversar?";
  }

  if (text.includes("feliz")) {
    return "Que ótimo 😄 gosto de ver você bem!";
  }

  if (text.includes("esporte")) {
    return "Esportes são incríveis ⚽🏃 qual você gosta?";
  }

  // padrão
  return "Entendi 😊 me conta mais sobre isso.";
}

function send() {
  let input = document.getElementById("msg");
  let text = input.value;

  if (text.trim() === "") return;

  add(text, "user");

  setTimeout(() => {
    let resp = brain(text);
    add("Mini Corrida: " + resp, "ai");
  }, 500);

  input.value = "";
}

// mensagem inicial
add("Mini Corrida: Oi! Eu sou sua IA amiga criada pela D&Happs 🤖", "ai");

</script>

</body>
</html>
