<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Minha Rede Social</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      background: #1e293b;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 15px;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    input, textarea {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .post {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
    }

    .bio {
      font-size: 12px;
      opacity: 0.8;
    }

    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<header>
  <h1>🚀 Minha Rede Social</h1>
</header>

<div class="container">

  <!-- PERFIL -->
  <div class="box">
    <h3>Seu Perfil</h3>
    <input id="username" placeholder="Nome de usuário">
    <textarea id="bio" placeholder="Sua bio"></textarea>
  </div>

  <!-- CRIAR POST -->
  <div class="box">
    <h3>Criar Post</h3>
    <textarea id="text" placeholder="O que você está pensando?"></textarea>
    <input id="image" placeholder="Link de imagem (opcional)">
    <button onclick="createPost()">Postar</button>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<script>
function createPost() {
  let user = document.getElementById("username").value;
  let bio = document.getElementById("bio").value;
  let text = document.getElementById("text").value;
  let image = document.getElementById("image").value;

  let post = document.createElement("div");
  post.className = "post";

  post.innerHTML = `
    <h3>${user || "Anônimo"}</h3>
    <div class="bio">${bio}</div>
    <p>${text}</p>
    ${image ? `<img src="${image}">` : ""}
  `;

  document.getElementById("feed").prepend(post);

  document.getElementById("text").value = "";
  document.getElementById("image").value = "";
}
</script>

</body>
</html>
