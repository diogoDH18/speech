<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      backdrop-filter: blur(10px);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    small {
      display: block;
      text-align: center;
      margin-top: 10px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>🔐 Criar Conta</h2>

    <input type="text" placeholder="Nome de usuário">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Senha">

    <button onclick="alert('Login simulado 🚀')">
      Entrar / Criar conta
    </button>

    <small>Versão demo (sem backend)</small>
  </div>

</body>
</html>
