<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Chat Seguro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 15px;
  background: #1e293b;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

.chat {
  background: #1e293b;
  height: 350px;
  overflow-y: auto;
  padding: 10px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.msg {
  background: #2563eb;
  padding: 8px;
  margin: 5px 0;
  border-radius: 8px;
}

input {
  width: 70%;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  width: 28%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.warning {
  color: #f87171;
  font-size: 12px;
}
</style>
</head>

<body>

<header>
  <h1>🛡️ Chat Seguro com IA básica</h1>
</header>

<div class="container">

<div class="chat" id="chat"></div>

<div>
  <input id="msg" placeholder="Escreva sua mensagem...">
  <button onclick="send()">Enviar</button>
</div>

<p class="warning" id="warn"></p>

</div>

<script>

// palavras bloqueadas (exemplo simples)
let blockedWords = [
  "odio", "hate", "racismo", "nude", "nudes", "sexo", "abuso"
];

function send() {
  let text = document.getElementById("msg").value.toLowerCase();

  let blocked = blockedWords.some(word => text.includes(word));

  if (blocked) {
    document.getElementById("warn").innerText =
      "⚠️ Mensagem bloqueada por segurança (conteúdo sensível detectado).";
    return;
  }

  document.getElementById("warn").innerText = "";

  let div = document.createElement("div");
  div.className = "msg";
  div.innerText = text;

  document.getElementById("chat").appendChild(div);

  document.getElementById("msg").value = "";
}

</script>

</body>
</html>
